<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DEPLOY TEST TankstellenAlert{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <!-- Design tokens (colors, spacing, typography) — do not modify -->
  <link rel="stylesheet" href="{{ url_for('static', path='css/design-tokens.css') }}">

  <!-- Component styles -->
  <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">

  {% block head %}{% endblock %}
</head>
<body>
<div id="app">

  <!-- ── Navigation ──────────────────────────────────────────── -->
  <nav id="app-nav" role="navigation" aria-label="Main navigation">
    <a href="/" class="nav-logo" aria-label="TankstellenAlert home">TankstellenAlert</a>

    {% if has_alert is defined and has_alert %}
    <button class="nav-alert-pill" type="button" aria-label="{{ alert_count }} price alert{{ 's' if alert_count != 1 else '' }}">
      <span class="nav-alert-dot" aria-hidden="true"></span>
      {{ alert_count }} alert{{ 's' if alert_count != 1 else '' }}
    </button>
    {% endif %}

    <div class="nav-links">
      <a href="/charts"  class="nav-link {% if active_page == 'charts'  %}active{% endif %}">Charts</a>
      <a href="/settings" class="nav-link {% if active_page == 'settings' %}active{% endif %}">Settings</a>
    </div>
  </nav>

  <!-- ── Page content ────────────────────────────────────────── -->
  <main id="page-main" class="{% block page_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  {% block bottom_nav %}{% endblock %}

</div><!-- #app -->

<!-- ── Libraries (end of body for performance) ─────────────── -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- Shared utilities (formatPrice, STATION_COLORS, etc.) -->
<script src="{{ url_for('static', path='js/app.js') }}"></script>

{% block scripts %}{% endblock %}
</body>
</html>
